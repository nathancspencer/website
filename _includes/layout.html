<html>
<head>
<link rel="icon" type="image/x-icon" href="../photos/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nathan Spencer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville&display=swap');

* {
	font-family: 'Libre Baskerville', serif;
	color: #333;
}

h1, h3 {
    text-align: center;
}

h1, h2 {
	margin-top: 0.75em;
	margin-bottom: 0em;
}

h1 {
	font-size: 2.25em;
}

h2 {
	font-size: 2em;
}

h3 {
	font-size: 0.5em;
}

p {
	font-size: 1em;
}

@media only screen and (min-width: 601px) {
	body {
		margin: auto;
		width: 35em;	
	}	
}

h1 a, h3 a {
	text-decoration:none;
	color:inherit;
}

main a {
	text-decoration:none; 
	color:#002A53;
	font-weight: bold;
}

strong {
	font-size: 1.25em;
}

a:hover {
	color: #53002a;
}

html {
	padding-bottom: 100px;
}

.flex-container {
	justify-content: center;
	display: flex;
}

.flex-container > div {
	margin: 0px;
	padding: 0px 20px;
	font-size: 30px;
}

img {
	max-width: 90%;
	margin: auto;
	display: block;
	border-radius: 1em;
	border-width: 0.1em;
	border-color: black;
	border-style: solid;
}


</style>
</head>
<body>
	<h1><a href="/">Nathan Spencer</a></h1>
	<div class="flex-container">
		<div><h3><a href="/photos">Photos</a></h3></div>
		<div><h3><a href="/belts">Belts</a></h3></div>
		<div><h3><a href="/about">About</a></h3></div>
	</div>
	<h2>{{ title }}</h2>
	<main>
		{{ content }}
	</main>
</body>
</html>
